<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>デバッグ</title>
  <style>*{margin:0;padding:0;background:#111;color:#fff;font-family:monospace;}</style>
</head>
<body>
<div id="log" style="padding:10px;font-size:14px;"></div>
<canvas id="c"></canvas>
<script>
const BASE = 'https://lunaseiya.github.io/aura-quest/';
const log = (msg, col='#fff') => {
  const d = document.getElementById('log');
  d.innerHTML += `<div style="color:${col}">${msg}</div>`;
};

log('🔍 診断開始...');

// 1. スプライトシート画像を直接fetch
fetch(BASE + 'players/final_sheet_cc.png')
  .then(r => {
    log(`✅ final_sheet_cc.png: HTTP ${r.status}`, r.ok ? '#2ecc71' : '#e74c3c');
    return r.blob();
  })
  .then(blob => {
    log(`📦 ファイルサイズ: ${(blob.size/1024).toFixed(1)}KB`, '#ffd700');
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      log(`🖼 画像サイズ: ${img.width}×${img.height}px`, '#ffd700');
      log(`📐 1コマサイズ(5×3): ${img.width/5}×${img.height/3}px`, '#ffd700');
      // canvasに描画してコマを確認
      const c = document.getElementById('c');
      c.width = img.width * 2; c.height = img.height * 2;
      const ctx = c.getContext('2d');
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(img, 0, 0, img.width*2, img.height*2);
      // グリッド描画
      ctx.strokeStyle = '#ff0000';
      ctx.lineWidth = 1;
      const fw = img.width/5 * 2, fh = img.height/3 * 2;
      for(let r=0;r<=3;r++) { ctx.beginPath(); ctx.moveTo(0,r*fh); ctx.lineTo(c.width,r*fh); ctx.stroke(); }
      for(let c2=0;c2<=5;c2++) { ctx.beginPath(); ctx.moveTo(c2*fw,0); ctx.lineTo(c2*fw,c.height); ctx.stroke(); }
      log('✅ 画像の描画成功！赤グリッドがコマの区切り', '#2ecc71');
      log('上から: front行 / back行 / side行', '#aaa');
      log('左から: idle / walk1 / walk2 / attack1 / attack2', '#aaa');
    };
    img.onerror = () => log('❌ 画像の読み込み失敗', '#e74c3c');
    img.src = url;
  })
  .catch(e => log('❌ fetchエラー: ' + e.message, '#e74c3c'));

// 2. bomber.pngも確認
fetch(BASE + 'players/bomber.png')
  .then(r => log(`📄 bomber.png (旧): HTTP ${r.status}`, r.ok ? '#aaa' : '#888'))
  .catch(e => log('bomber.png: ' + e.message, '#888'));
</script>
</body>
</html>

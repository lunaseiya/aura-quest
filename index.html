<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="LUNA FRONTIER">
  <!-- ホーム画面アイコン -->
  <link rel="apple-touch-icon" href="icon_180.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon_180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon_192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon_512.png">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>LUNA FRONTIER</title>
  <!-- Google Fonts: ダメージ表示&タイトル用 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Bangers&family=Press+Start+2P&family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{
      width:100vw;
      /* iOS Safari 等の動的アドレスバー対応:
         100% だとアドレスバー表示込みの高さになり、後で縮むと余白が出る。
         100dvh は表示中ビューポートの高さに動的追従する */
      height:100vh;
      height:100dvh;
      overflow:hidden;
      background:#000;
      display:block;
      position:fixed;
      top:0; left:0;
    }
    canvas{
      display:block;
      width:100% !important;
      height:100% !important;
      touch-action:none;
    }
    /* ── 縦向き(ポートレート)時はゲームを隠して案内表示 ── */
    /* 横が標準。スマホで縦に持つと「横向きにしてね」と促す */
    #rotate-prompt{
      display:none;
      position:fixed; top:0; left:0; width:100vw; height:100vh; height:100dvh;
      background:#0a0f1a; color:#ffeebb; z-index:9999;
      flex-direction:column; justify-content:center; align-items:center;
      text-align:center; padding:20px;
      font-family:'Bangers','Orbitron',sans-serif;
    }
    #rotate-prompt .icon{
      font-size:84px; margin-bottom:24px;
      animation:rotateHint 2s ease-in-out infinite;
    }
    #rotate-prompt .msg{
      font-size:22px; line-height:1.6; letter-spacing:0.05em;
    }
    #rotate-prompt .sub{
      font-size:13px; margin-top:18px; color:#88aabb;
    }
    @keyframes rotateHint{
      0%, 100% { transform: rotate(-12deg); }
      50%      { transform: rotate(78deg);  }
    }
    /* 縦向きの時だけオーバーレイを出してキャンバスを隠す */
    @media (orientation: portrait){
      #rotate-prompt{ display:flex; }
      canvas{ visibility:hidden; }
    }
  </style>
</head>
<body>
  <!-- 縦向きで開いた時に表示される案内(横向きにすると自動で消える) -->
  <div id="rotate-prompt">
    <div class="icon">📱</div>
    <div class="msg">画面を <strong>横向き</strong> に<br>してください</div>
    <div class="sub">LUNA FRONTIER は横画面でお楽しみください</div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script>
    // NPC セリフは別ファイル化(編集しやすさのため)
    // game.js より先にロードする
    const cacheBust = '?v=' + Date.now();
    const dlg = document.createElement('script');
    dlg.src = 'npc_dialog.js' + cacheBust;
    dlg.onload = () => {
      // npc_dialog.js のロード完了後に game.js を読み込む
      const g = document.createElement('script');
      g.src = 'game.js' + cacheBust;
      document.body.appendChild(g);
    };
    document.body.appendChild(dlg);
  </script>
</body>
</html>

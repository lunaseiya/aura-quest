<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AURA QUEST</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; touch-action: none; -webkit-user-select: none; }
    #rotate-msg {
      display: none; position: fixed; inset: 0;
      background: #000; color: #ffd700;
      font-size: 22px; font-family: 'Courier New', monospace;
      flex-direction: column; align-items: center;
      justify-content: center; z-index: 9999;
      text-align: center; gap: 20px;
    }
  </style>
</head>
<body>
  <div id="rotate-msg">
    <div style="font-size:56px">📱↔️</div>
    <div>端末を横向きにしてください</div>
    <div style="font-size:14px;color:#aaa">Please rotate your device</div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
  <script src="game.js"></script>
  <script>
    function checkOrientation(){
      const msg=document.getElementById('rotate-msg');
      msg.style.display=(window.innerHeight>window.innerWidth)?'flex':'none';
    }
    window.addEventListener('resize',checkOrientation);
    window.addEventListener('orientationchange',()=>setTimeout(checkOrientation,200));
    checkOrientation();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>AURA QUEST</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
    }
    #game-container {
      width: 100vw;
      height: 100vh;
    }
    canvas {
      display: block;
      touch-action: none;
    }
    #rotate-msg {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      color: #ffd700;
      font-size: 20px;
      font-family: 'Courier New', monospace;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      text-align: center;
      gap: 16px;
    }
  </style>
</head>
<body>
  <div id="rotate-msg">
    <div style="font-size:48px;">📱↔️</div>
    <div>端末を横向きにしてください</div>
    <div style="font-size:14px;color:#aaa;">Please rotate your device</div>
  </div>
  <div id="game-container"></div>

  <script>
    function checkOrientation() {
      const msg = document.getElementById('rotate-msg');
      msg.style.display = window.innerHeight > window.innerWidth ? 'flex' : 'none';
    }
    window.addEventListener('resize', checkOrientation);
    window.addEventListener('orientationchange', checkOrientation);
    window.addEventListener('load', checkOrientation);
    document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
    document.addEventListener('touchstart', e => { if(e.touches.length > 1) e.preventDefault(); }, { passive: false });
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
  <script src="game.js"></script>
</body>
</html>

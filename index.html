<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="LUNA FRONTIER">
  <!-- ホーム画面アイコン -->
  <link rel="apple-touch-icon" href="icon_180.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon_180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon_192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon_512.png">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>LUNA FRONTIER</title>
  <!-- Google Fonts: ダメージ表示&タイトル用 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Bangers&family=Press+Start+2P&family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{
      width:100vw;
      /* iOS Safari 等の動的アドレスバー対応:
         100% だとアドレスバー表示込みの高さになり、後で縮むと余白が出る。
         100dvh は表示中ビューポートの高さに動的追従する */
      height:100vh;
      height:100dvh;
      overflow:hidden;
      background:#000;
      display:block;
      position:fixed;
      top:0; left:0;
    }
    canvas{
      display:block;
      width:100% !important;
      height:100% !important;
      touch-action:none;
    }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script>
    // game.js を毎回キャッシュなしで読み込む
    const s = document.createElement('script');
    s.src = 'game.js?v=' + Date.now();
    document.body.appendChild(s);
  </script>
</body>
</html>
